<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff4d9d"/>
      <stop offset="0.5" stop-color="#a435f0"/>
      <stop offset="1" stop-color="#4d7cff"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.25" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- フチなし背景。Fは中央80%のセーフゾーン内に縮小配置 -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" fill="url(#glow)"/>
  <g fill="#ffffff" transform="translate(256 256) scale(0.74) translate(-265 -256)">
    <rect x="170" y="140" width="78" height="232" rx="24"/>
    <rect x="170" y="140" width="190" height="70" rx="24"/>
    <rect x="170" y="234" width="150" height="64" rx="24"/>
  </g>
</svg>
